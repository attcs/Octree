name: Benchmarks
on:
  push:
    branches:
      - master
      - google_benchmark

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    name: Run Google Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Benchmark library
        uses: actions/cache@v4
        with:
          path: benchmarks/automatic
          key: ${{ runner.os }}-googlebenchmark-v1.5.0
      - name: Run benchmark
        run: cd benchmarks/automatic && make json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: C++ Benchmark
          tool: 'googlecpp'
          output-file-path: automatic_benchmarks/benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          auto-push-branch: gh-pages
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@attcs'
